version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gocyclo
    - godot
    - gosec
    - revive
    - staticcheck
    - unconvert
    - unused
    - whitespace
  settings:
    gocyclo:
      min-complexity: 30
    godot:
      scope: all
      capital: true
      period: true
    staticcheck:
      checks:
        - all
  exclusions:
    generated: lax
    rules:
      - linters:
          - gosec
        path: (.+)_test.go
      - path: (.+)\.go$
        text: should have a package comment
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/auth0/terraform-provider-auth0
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
